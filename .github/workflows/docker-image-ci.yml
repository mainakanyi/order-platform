name: Docker Image CI

on:
  push:
    branches:
      - main
      - feature/docker-image-ci

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-docker-images:
    name: Build Docker images
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build and test Maven modules
        run: |
          ./mvnw \
            --batch-mode \
            --no-transfer-progress \
            clean verify

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Config Server image
        uses: docker/build-push-action@v7
        with:
          context: ./config-server
          file: ./config-server/Dockerfile
          push: false
          tags: order-platform/config-server:ci
          cache-from: type=gha,scope=config-server
          cache-to: type=gha,mode=max,scope=config-server

      - name: Build Order Service image
        uses: docker/build-push-action@v7
        with:
          context: ./order-service
          file: ./order-service/Dockerfile
          push: false
          tags: order-platform/order-service:ci
          cache-from: type=gha,scope=order-service
          cache-to: type=gha,mode=max,scope=order-service

      - name: Build Notification Service image
        uses: docker/build-push-action@v7
        with:
          context: ./notification-service
          file: ./notification-service/Dockerfile
          push: false
          tags: order-platform/notification-service:ci
          cache-from: type=gha,scope=notification-service
          cache-to: type=gha,mode=max,scope=notification-service

      - name: Validate Docker Compose configuration
        run: |
          docker compose \
            -f infrastructure/docker-compose.yml \
            -f infrastructure/docker-compose.apps.yml \
            config > /dev/null

          echo "Docker Compose configuration is valid."
