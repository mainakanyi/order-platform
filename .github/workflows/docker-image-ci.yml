name: Docker Image CI

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-publish:
    name: Build and publish Docker images
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build and test Maven modules
        run: |
          ./mvnw \
            --batch-mode \
            --no-transfer-progress \
            clean verify

      - name: Set lowercase owner name
        run: |
          echo "OWNER_LC=$(echo "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')" \
            >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---------------------------------------------------------
      # Config Server
      # ---------------------------------------------------------

      - name: Generate Config Server image metadata
        id: config-meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/order-platform-config-server
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and publish Config Server image
        uses: docker/build-push-action@v7
        with:
          context: ./config-server
          file: ./config-server/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.config-meta.outputs.tags }}
          labels: ${{ steps.config-meta.outputs.labels }}
          cache-from: type=gha,scope=config-server
          cache-to: type=gha,mode=max,scope=config-server

      # ---------------------------------------------------------
      # Order Service
      # ---------------------------------------------------------

      - name: Generate Order Service image metadata
        id: order-meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/order-platform-order-service
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and publish Order Service image
        uses: docker/build-push-action@v7
        with:
          context: ./order-service
          file: ./order-service/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.order-meta.outputs.tags }}
          labels: ${{ steps.order-meta.outputs.labels }}
          cache-from: type=gha,scope=order-service
          cache-to: type=gha,mode=max,scope=order-service

      # ---------------------------------------------------------
      # Notification Service
      # ---------------------------------------------------------

      - name: Generate Notification Service image metadata
        id: notification-meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/order-platform-notification-service
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and publish Notification Service image
        uses: docker/build-push-action@v7
        with:
          context: ./notification-service
          file: ./notification-service/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.notification-meta.outputs.tags }}
          labels: ${{ steps.notification-meta.outputs.labels }}
          cache-from: type=gha,scope=notification-service
          cache-to: type=gha,mode=max,scope=notification-service

      - name: Validate Docker Compose configuration
        run: |
          docker compose \
            -f infrastructure/docker-compose.yml \
            -f infrastructure/docker-compose.apps.yml \
            config > /dev/null

          echo "Docker Compose configuration is valid."
