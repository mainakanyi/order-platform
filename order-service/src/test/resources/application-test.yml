spring:
  cloud:
    config:
      enabled: false
  datasource:
    url: jdbc:h2:mem:order_db;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  kafka:
    bootstrap-servers: localhost:9092
    admin:
      fail-fast: false

app:
  kafka:
    topics:
      order-created: order-created
    topic-settings:
      order-created:
        partitions: 3
        replicas: 1
