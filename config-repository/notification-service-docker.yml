server:
  port: 8082

spring:
  kafka:
    bootstrap-servers:
      - kafka-1:29092
      - kafka-2:29092
      - kafka-3:29092

    consumer:
      group-id: notification-service-group
      auto-offset-reset: earliest

    listener:
      concurrency: 3

app:
  kafka:
    topics:
      order-created: order-created