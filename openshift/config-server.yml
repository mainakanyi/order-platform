apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server
  labels:
    app: config-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-server
  template:
    metadata:
      labels:
        app: config-server
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: config-server
          image: ghcr.io/mainakanyi/order-platform-config-server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8888
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: git
            - name: CONFIG_GIT_URI
              value: https://github.com/mainakanyi/order-platform.git
            - name: CONFIG_GIT_DEFAULT_LABEL
              value: main
            - name: CONFIG_GIT_SEARCH_PATHS
              value: config-repository
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8888
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8888
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: config-server
  labels:
    app: config-server
spec:
  selector:
    app: config-server
  ports:
    - name: http
      port: 8888
      targetPort: 8888
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: config-server
  labels:
    app: config-server
spec:
  to:
    kind: Service
    name: config-server
  port:
    targetPort: http
